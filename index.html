<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Accounting II - Practice Exam</title>
    <style>
        /* Dark Mode Theme */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Progress Bar */
        #progress-container {
            width: 100%;
            background-color: #333;
            height: 10px;
            position: fixed;
            top: 0;
            left: 0;
        }
        #progress-bar {
            height: 100%;
            background-color: #4caf50;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Main Card */
        .container {
            background-color: #1e1e1e;
            width: 90%;
            max-width: 600px;
            margin-top: 60px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .topic-tag {
            color: #64b5f6;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        h2 { margin-top: 0; }

        /* Buttons */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background-color: #2c2c2c;
            color: #fff;
            border: 2px solid #333;
            padding: 15px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #3a3a3a;
            border-color: #64b5f6;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Feedback Section */
        #feedback-section {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .correct-text { color: #4caf50; font-weight: bold; font-size: 1.2em; }
        .wrong-text { color: #f44336; font-weight: bold; font-size: 1.2em; }
        
        .explanation {
            margin-top: 10px;
            font-size: 0.95em;
            color: #ccc;
        }

        #next-btn, #restart-btn {
            background-color: #64b5f6;
            color: #000;
            font-weight: bold;
            margin-top: 20px;
            border: none;
        }
        #next-btn:hover, #restart-btn:hover { background-color: #42a5f5; }

        /* Hide elements dynamically */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="container" id="quiz-container">
        <span class="topic-tag" id="topic-display">Topic</span>
        <h2 id="question-text">Loading question...</h2>
        
        <div class="options-grid" id="options-container">
            </div>

        <div id="feedback-section">
            <div id="feedback-result"></div>
            <div class="explanation" id="explanation-text"></div>
            <button id="next-btn" onclick="nextQuestion()">Next Question</button>
        </div>
    </div>

    <div class="container hidden" id="results-container">
        <h2>Exam Complete!</h2>
        <h1 id="score-display">0%</h1>
        <p id="score-message"></p>
        <button id="restart-btn" onclick="startExam()">Retake Exam</button>
    </div>

    <script>
        // ==========================================
        // 📚 YOUR QUESTION BANK
        // Add all your Intermediate II questions here!
        // ==========================================
        const masterQuestionBank = [
            {
                const masterQuestionBank = [
            {
                topic: "Leases",
                question: "If a lease contains a 'bargain purchase option', what is the appropriate depreciation period for the Right-of-Use (ROU) asset?",
                options: ["The lease term.", "The economic life of the asset.", "5 years per GAAP default.", "It is not depreciated."],
                answer: "The economic life of the asset.",
                explanation: "If ownership transfers or there is a bargain purchase option, you depreciate over the asset's full economic life, not just the lease term."
            },
            {
                topic: "Leases",
                question: "Which of the following is a 'qualitative' factor that could trigger a Finance Lease classification?",
                options: ["The asset is of such a specialized nature that it has no alternative use to the lessor.", "The lease term is 50% of the asset life.", "The PV of payments is 75% of fair value.", "The lease has a month-to-month cancellation clause."],
                answer: "The asset is of such a specialized nature that it has no alternative use to the lessor.",
                explanation: "This is the '5th test.' If the asset is so specialized that the lessor can't lease it to anyone else afterward, it is a finance lease."
            },
            {
                topic: "Bonds",
                question: "When using the effective-interest method, interest expense is calculated by multiplying the ________ by the ________.",
                options: ["Face value; Stated rate", "Carrying value; Stated rate", "Carrying value; Market rate", "Face value; Market rate"],
                answer: "Carrying value; Market rate",
                explanation: "Interest Expense = Carrying Value x Market (Effective) Rate. The cash paid is Face Value x Stated Rate."
            },
            {
                topic: "Bonds",
                question: "A bond issued at a discount results in a cash interest payment that is:",
                options: ["Higher than the interest expense.", "Lower than the interest expense.", "Equal to the interest expense.", "Zero until maturity."],
                answer: "Lower than the interest expense.",
                explanation: "When a bond is at a discount, the interest expense includes the cash paid PLUS the amortization of the discount."
            },
            {
                topic: "Pensions",
                question: "The 'PBO' (Projected Benefit Obligation) is measured using:",
                options: ["Current salary levels.", "Future salary levels.", "Only vested benefits.", "The market value of plan assets."],
                answer: "Future salary levels.",
                explanation: "PBO is the most comprehensive measure because it assumes the employees will continue to work and receive pay raises (future salaries)."
            },
            {
                topic: "Pensions",
                question: "Which pension component is recorded in Other Comprehensive Income (OCI) and then amortized over time?",
                options: ["Service Cost", "Interest Cost", "Prior Service Cost", "Expected Return on Assets"],
                answer: "Prior Service Cost",
                explanation: "Prior Service Cost (from plan amendments) is parked in OCI and recycled into Pension Expense over the remaining service life of employees."
            },
            {
                topic: "Deferred Taxes",
                question: "Which of the following creates a Deferred Tax Liability (DTL)?",
                options: ["Fines and penalties.", "Warranty liabilities.", "Accelerated depreciation for tax and straight-line for books.", "Subscriptions received in advance."],
                answer: "Accelerated depreciation for tax and straight-line for books.",
                explanation: "Accelerated depreciation means you pay less tax now but will pay more later—this is the definition of a liability."
            },
            {
                topic: "Deferred Taxes",
                question: "A 'Permanent Difference' between book income and tax income:",
                options: ["Creates a Deferred Tax Asset.", "Creates a Deferred Tax Liability.", "Results in an effective tax rate that differs from the statutory rate.", "Will reverse in future years."],
                answer: "Results in an effective tax rate that differs from the statutory rate.",
                explanation: "Permanent differences (like muni-bond interest) never reverse, so they don't create DTAs or DTLs. They just change your actual tax percentage."
            },
            {
                topic: "EPS",
                question: "In calculating Diluted EPS, the 'if-converted' method for convertible bonds assumes:",
                options: ["Interest expense (net of tax) is added back to the numerator.", "Preferred dividends are subtracted from the numerator.", "Shares are added to the denominator at the end of the year.", "The bonds were never issued."],
                answer: "Interest expense (net of tax) is added back to the numerator.",
                explanation: "If the bonds were converted, the company wouldn't have paid interest. Therefore, we add that saved interest expense back to the net income."
            },
            {
                topic: "EPS",
                question: "Stock options are considered 'dilutive' only when:",
                options: ["The company is profitable.", "The exercise price is higher than the market price.", "The market price is higher than the exercise price.", "The board of directors declares a dividend."],
                answer: "The market price is higher than the exercise price.",
                explanation: "This is 'In the Money.' If the market price is lower, the options are 'Antidilutive' because nobody would exercise them."
            },
            {
                topic: "Revenue Recognition",
                question: "Under the 5-step model, when is revenue recognized for a performance obligation satisfied 'over time'?",
                options: ["Only when the contract is 100% complete.", "Based on the progress toward completion.", "When the cash is received.", "When the contract is signed."],
                answer: "Based on the progress toward completion.",
                explanation: "Companies use input or output methods (like percentage-of-completion) to recognize revenue as they work."
            },
            {
                topic: "Stockholders Equity",
                question: "When treasury stock is purchased using the 'Cost Method', which account is debited?",
                options: ["Common Stock", "Retained Earnings", "Treasury Stock", "Paid-in Capital"],
                answer: "Treasury Stock",
                explanation: "Treasury Stock is a contra-equity account. You debit it at the cost paid to reacquire the shares."
            },
            {
                topic: "Stockholders Equity",
                question: "A small stock dividend (less than 20-25%) is recorded at:",
                options: ["Par value.", "Market value.", "Liquidation value.", "Historical cost."],
                answer: "Market value.",
                explanation: "Small stock dividends are recorded at fair market value, while large stock dividends are recorded at par value."
            },
            {
                topic: "Statement of Cash Flows",
                question: "Under the indirect method, an increase in Accounts Receivable is:",
                options: ["Added to Net Income.", "Subtracted from Net Income.", "Ignored.", "Added to Financing Activities."],
                answer: "Subtracted from Net Income.",
                explanation: "An increase in AR means you earned revenue (included in Net Income) but didn't collect the cash yet. You must subtract it to get to Cash Basis."
            },
            {
                topic: "Investments",
                question: "Debt investments classified as 'Held-to-Maturity' (HTM) are reported at:",
                options: ["Fair Value.", "Amortized Cost.", "Lower of Cost or Market.", "Net Realizable Value."],
                answer: "Amortized Cost.",
                explanation: "Since you intend to hold them until they mature, fluctuations in market price don't matter; you report the cost adjusted for amortization."
            },
            {
                topic: "Investments",
                question: "Unrealized gains/losses on 'Trading' debt securities are reported in:",
                options: ["Other Comprehensive Income (OCI).", "Net Income.", "Retained Earnings directly.", "The notes only."],
                answer: "Net Income.",
                explanation: "Trading securities are meant for quick profit, so gains and losses go directly to the Income Statement."
            },
            {
                topic: "Revenue Recognition",
                question: "A 'Contract Liability' is created when:",
                options: ["Work is done before payment.", "Cash is received before work is done.", "A contract is cancelled.", "A customer returns a product."],
                answer: "Cash is received before work is done.",
                explanation: "This was formerly known as Unearned Revenue."
            },
            {
                topic: "Pensions",
                question: "The 'Corridor' for pension gain/loss amortization is defined as 10% of the greater of:",
                options: ["PBO or Fair Value of Plan Assets.", "Service Cost or Interest Cost.", "Net Income or Retained Earnings.", "Market Rate or Stated Rate."],
                answer: "PBO or Fair Value of Plan Assets.",
                explanation: "If the accumulated gain/loss exceeds this 'corridor,' the excess must be amortized into expense."
            },
            {
                topic: "Dilutive Securities",
                question: "The 'Treasury Stock Method' is used to calculate the dilutive effect of:",
                options: ["Convertible Bonds.", "Convertible Preferred Stock.", "Stock Options and Warrants.", "Stock Splits."],
                answer: "Stock Options and Warrants.",
                explanation: "This method assumes the proceeds from exercising options are used by the company to buy back shares at the average market price."
            },
            {
                topic: "Leases",
                question: "From the perspective of the Lessor, a lease that meets the finance criteria but has a third-party guarantee is called a:",
                options: ["Operating Lease.", "Direct-Financing Lease.", "Sales-Type Lease.", "Capital Lease."],
                answer: "Direct-Financing Lease.",
                explanation: "If the lease meets finance criteria but the profit is only due to a third-party guarantee (not a manufacturer profit), it's Direct-Financing."
            },
            {
                topic: "Deferred Taxes",
                question: "A valuation allowance is required for a Deferred Tax Asset if it is:",
                options: ["More likely than not that some portion will not be realized.", "A permanent difference.", "A liability instead of an asset.", "Over $1 million."],
                answer: "More likely than not that some portion will not be realized.",
                explanation: "'More likely than not' means a probability of greater than 50%."
            },
            {
                topic: "Accounting Changes",
                question: "A change in depreciation method (e.g., from Double Declining to Straight Line) is treated as a:",
                options: ["Change in Accounting Principle.", "Change in Accounting Estimate.", "Error Correction.", "Change in Reporting Entity."],
                answer: "Change in Accounting Estimate.",
                explanation: "Even though it sounds like a principle, GAAP treats a change in depreciation method as a change in estimate achieved by a change in principle (prospective application)."
            },
            {
                topic: "Accounting Changes",
                question: "Correction of an error from a prior period requires:",
                options: ["A footnote only.", "Prospective adjustment.", "A prior period adjustment to Retained Earnings.", "Writing off the asset."],
                answer: "A prior period adjustment to Retained Earnings.",
                explanation: "Errors are handled 'retrospectively,' meaning you go back and fix the beginning balance of Retained Earnings."
            },
            {
                topic: "Bonds",
                question: "The 'Stated Rate' on a bond is also known as the:",
                options: ["Effective Rate.", "Market Rate.", "Coupon Rate.", "Yield."],
                answer: "Coupon Rate.",
                explanation: "The Coupon or Nominal rate is what is printed on the bond and determines the cash interest payments."
            },
            {
                topic: "Pensions",
                question: "If Plan Assets ($500k) are less than the PBO ($600k), the plan is:",
                options: ["Overfunded.", "Underfunded.", "In Equilibrium.", "Fully Vested."],
                answer: "Underfunded.",
                explanation: "If you owe more (PBO) than you have in the bank (Plan Assets), the plan is underfunded and shown as a liability on the balance sheet."
            }
        ];
        ];

        // ==========================================
        // ⚙️ APP LOGIC
        // ==========================================
        const QUESTIONS_PER_EXAM = 25; 
        let currentExamQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Fisher-Yates Shuffle Algorithm
        function shuffleArray(array) {
            let shuffled = array.slice();
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startExam() {
            // Hide results, show quiz
            document.getElementById('results-container').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            
            // Reset variables
            score = 0;
            currentQuestionIndex = 0;

            // Shuffle master bank and grab the required amount
            // (Uses Math.min just in case you have fewer than 25 questions in the bank right now)
            let shuffledBank = shuffleArray(masterQuestionBank);
            let limit = Math.min(QUESTIONS_PER_EXAM, shuffledBank.length);
            currentExamQuestions = shuffledBank.slice(0, limit);

            loadQuestion();
        }

        function loadQuestion() {
            // Reset UI
            document.getElementById('feedback-section').style.display = 'none';
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Update Progress Bar
            let progressPct = (currentQuestionIndex / currentExamQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;

            // Load current question data
            const qData = currentExamQuestions[currentQuestionIndex];
            document.getElementById('topic-display').innerText = `Question ${currentQuestionIndex + 1} of ${currentExamQuestions.length} — ${qData.topic}`;
            document.getElementById('question-text').innerText = qData.question;

            // Shuffle the options so they aren't always in the same order A, B, C, D
            let shuffledOptions = shuffleArray(qData.options);

            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.innerText = option;
                btn.onclick = () => checkAnswer(btn, option, qData);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(clickedBtn, selectedOption, qData) {
            // Disable all buttons so user can't click twice
            const allButtons = document.getElementById('options-container').querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);

            const feedbackSection = document.getElementById('feedback-section');
            const resultText = document.getElementById('feedback-result');
            const explanationText = document.getElementById('explanation-text');

            feedbackSection.style.display = 'block';

            if (selectedOption === qData.answer) {
                score++;
                clickedBtn.style.backgroundColor = '#2e7d32'; // Dark green
                clickedBtn.style.borderColor = '#4caf50';
                resultText.innerHTML = '<span class="correct-text">Correct!</span>';
                explanationText.innerText = qData.explanation;
            } else {
                clickedBtn.style.backgroundColor = '#c62828'; // Dark red
                clickedBtn.style.borderColor = '#f44336';
                resultText.innerHTML = '<span class="wrong-text">Wrong.</span>';
                explanationText.innerHTML = `<strong>Correct Answer:</strong> ${qData.answer}<br><br>${qData.explanation}`;
                
                // Highlight the correct answer
                allButtons.forEach(btn => {
                    if(btn.innerText === qData.answer) {
                        btn.style.borderColor = '#4caf50';
                        btn.style.color = '#4caf50';
                    }
                });
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentExamQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('results-container').classList.remove('hidden');
            
            // Set progress bar to 100%
            document.getElementById('progress-bar').style.width = `100%`;

            let percent = Math.round((score / currentExamQuestions.length) * 100);
            document.getElementById('score-display').innerText = `${percent}%`;

            let message = "";
            if(percent >= 90) message = "Excellent work! You are ready for the exam.";
            else if (percent >= 70) message = "Good job, but keep reviewing the explanations.";
            else message = "Keep studying! Intermediate II is tough, you've got this.";

            document.getElementById('score-message').innerText = message;
        }

        // Start the app when the page loads
        window.onload = startExam;

    </script>
</body>
</html>
